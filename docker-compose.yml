services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: pnpm --filter @addis-song-library/backend dev
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/song-library
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app/backend
      - /app/node_modules
      - /app/backend/node_modules
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
